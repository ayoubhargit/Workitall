<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Industrial automation, robotics integration, traceability, and technical support from Tangier for factories in Morocco and abroad.">
<meta name="keywords" content="automation, robotics, PLC, smart manufacturing, Industry 4.0, Morocco, Tangier">
<title>Work It All | Advanced Automation & Robotics Solutions</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --ink-950: #081725;
  --ink-900: #0f283a;
  --ink-800: #1c425e;
  --ink-700: #2d607f;
  --paper-100: #dcecff;
  --paper-200: #cfe2fb;
  --paper-300: #bdd4f3;
  --card: #e8f2ff;
  --accent: #1f6fe5;
  --accent-deep: #174fb4;
  --signal: #1a6ec7;
  --line: #b8cfe8;
  --shadow-lg: 0 22px 55px rgba(8, 25, 40, 0.14);
  --shadow-md: 0 12px 30px rgba(8, 25, 40, 0.1);
  --radius-xl: 26px;
  --radius-lg: 18px;
  --radius-md: 12px;
  --transition: all 220ms ease;
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: "Public Sans", sans-serif;
  color: var(--ink-900);
  line-height: 1.6;
  background: var(--paper-100);
  position: relative;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  background:
    radial-gradient(circle at 14% 10%, rgba(40, 105, 182, 0.28), transparent 38%),
    radial-gradient(circle at 88% 0%, rgba(24, 158, 193, 0.22), transparent 42%),
    linear-gradient(180deg, #d9eaff 0%, #cfe3fb 46%, #e3f0ff 100%);
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -1;
  pointer-events: none;
  background-image:
    linear-gradient(rgba(20, 58, 83, 0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(20, 58, 83, 0.05) 1px, transparent 1px);
  background-size: 36px 36px;
  -webkit-mask-image: radial-gradient(circle at center, black 26%, transparent 76%);
  mask-image: radial-gradient(circle at center, black 26%, transparent 76%);
}

h1,
h2,
h3,
h4 {
  margin: 0;
  font-family: "Space Grotesk", sans-serif;
  line-height: 1.2;
}

p {
  margin: 0;
}

a {
  color: inherit;
}

img {
  display: block;
  max-width: 100%;
}

ul {
  margin: 0;
  padding: 0;
  list-style: none;
}

main {
  overflow: hidden;
}

.sr-only {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

.container {
  width: min(1220px, 100% - clamp(32px, 8vw, 112px));
  margin: 0 auto;
}

.section {
  padding: clamp(58px, 8vw, 94px) 0;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  gap: 22px;
  margin-bottom: 28px;
}

.section-kicker {
  font-size: 0.78rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--ink-700);
  margin-bottom: 8px;
  font-weight: 700;
}

.section-title {
  font-size: clamp(1.55rem, 4vw, 2.4rem);
  color: var(--ink-900);
}

.section-intro {
  max-width: 580px;
  color: var(--ink-800);
  font-size: 1rem;
}

.reveal {
  opacity: 0;
  transform: translateY(24px);
  transition: opacity 620ms ease, transform 620ms ease;
  transition-delay: var(--delay, 0ms);
}

.reveal.is-visible {
  opacity: 1;
  transform: translateY(0);
}

.site-header {
  position: sticky;
  top: 0;
  z-index: 40;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  align-items: center;
  gap: 14px;
  padding: 14px clamp(14px, 3.4vw, 40px);
  background: rgba(214, 230, 247, 0.92);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
}

.brand img {
  width: 56px;
  height: 56px;
  object-fit: contain;
  background: #e7f1ff;
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 5px;
  box-shadow: var(--shadow-md);
}

.brand-name {
  font-size: 1.1rem;
  font-weight: 700;
}

.brand-word-main {
  color: #000000;
}

.brand-word-link {
  color: var(--accent-deep);
}

.site-nav {
  display: flex;
  justify-content: center;
  gap: 6px;
}

.site-nav a {
  text-decoration: none;
  color: var(--ink-800);
  padding: 9px 12px;
  border-radius: 999px;
  font-size: 0.92rem;
  font-weight: 700;
  transition: var(--transition);
}

.site-nav a:hover {
  color: var(--ink-950);
  background: var(--paper-200);
}

.header-tools {
  display: flex;
  align-items: center;
  gap: 10px;
}

.quick-contact {
  text-decoration: none;
  color: #ffffff;
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  border-radius: 999px;
  padding: 10px 16px;
  font-weight: 700;
  font-size: 0.9rem;
  box-shadow: 0 10px 24px rgba(204, 101, 24, 0.34);
  transition: var(--transition);
}

.quick-contact:hover {
  transform: translateY(-1px);
}

.language-select {
  border: 1px solid var(--line);
  border-radius: 10px;
  padding: 9px 10px;
  min-width: 102px;
  background: var(--card);
  color: var(--ink-900);
  font-family: inherit;
  font-size: 0.9rem;
}

.language-select:focus {
  outline: none;
  border-color: var(--ink-700);
  box-shadow: 0 0 0 4px rgba(45, 96, 127, 0.15);
}

.menu-button {
  display: none;
  width: 42px;
  height: 42px;
  border: 1px solid var(--line);
  border-radius: 10px;
  background: var(--card);
  padding: 0;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  gap: 4px;
  cursor: pointer;
}

.menu-button span {
  width: 18px;
  height: 2px;
  background: var(--ink-900);
  transition: var(--transition);
}

.menu-button[aria-expanded="true"] span:nth-child(1) {
  transform: translateY(6px) rotate(45deg);
}

.menu-button[aria-expanded="true"] span:nth-child(2) {
  opacity: 0;
}

.menu-button[aria-expanded="true"] span:nth-child(3) {
  transform: translateY(-6px) rotate(-45deg);
}

.hero {
  padding-top: clamp(56px, 8vw, 94px);
  padding-bottom: 42px;
}

.hero-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.18fr) minmax(0, 0.82fr);
  gap: 18px;
  align-items: stretch;
}

.hero-copy {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  box-shadow: var(--shadow-lg);
  padding: clamp(28px, 4vw, 56px);
  position: relative;
  overflow: hidden;
}

.hero-copy::before {
  content: "";
  position: absolute;
  top: -85px;
  right: -70px;
  width: 220px;
  height: 220px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(236, 127, 44, 0.35), transparent 72%);
}

.eyebrow {
  display: inline-block;
  margin-bottom: 12px;
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 6px 12px;
  background: var(--paper-200);
  color: var(--ink-700);
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.hero-title {
  font-size: clamp(2rem, 4.8vw, 3.74rem);
  color: var(--ink-950);
  margin-bottom: 14px;
  max-width: 12ch;
}

.hero-lead {
  color: var(--ink-800);
  font-size: clamp(1rem, 1.5vw, 1.16rem);
  max-width: 62ch;
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin: 26px 0;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  border: 1px solid transparent;
  text-decoration: none;
  padding: 12px 21px;
  font-weight: 700;
  font-size: 0.93rem;
  transition: var(--transition);
}

.btn-primary {
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
  color: #ffffff;
  box-shadow: 0 8px 20px rgba(204, 101, 24, 0.3);
}

.btn-primary:hover {
  transform: translateY(-2px);
}

.btn-secondary {
  border-color: var(--line);
  color: var(--ink-900);
  background: var(--card);
}

.btn-secondary:hover {
  background: var(--paper-200);
}

.hero-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.hero-tags li {
  background: var(--paper-200);
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 8px 12px;
  color: var(--ink-800);
  font-weight: 600;
  font-size: 0.83rem;
}

.hero-panel {
  background: linear-gradient(160deg, #0f3047 0%, #1b4f6f 58%, #1f8a72 145%);
  border-radius: var(--radius-xl);
  color: #e8f3fb;
  box-shadow: var(--shadow-lg);
  padding: 22px;
  position: relative;
  overflow: hidden;
}

.hero-panel::before {
  content: "";
  position: absolute;
  inset: auto -90px -90px auto;
  width: 240px;
  height: 240px;
  border-radius: 50%;
  background: rgba(236, 127, 44, 0.2);
}

.hero-panel img {
  width: 100%;
  height: 220px;
  object-fit: cover;
  border-radius: 15px;
  border: 1px solid rgba(255, 255, 255, 0.25);
}

.hero-panel h3 {
  margin: 16px 0 8px;
  color: #ffffff;
  font-size: 1.5rem;
}

.hero-panel p {
  color: rgba(232, 243, 251, 0.9);
  margin-bottom: 14px;
}

.panel-list {
  display: grid;
  gap: 10px;
}

.panel-list li {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  background: rgba(255, 255, 255, 0.11);
  border: 1px solid rgba(255, 255, 255, 0.19);
  border-radius: 12px;
  padding: 10px 12px;
  font-size: 0.9rem;
}

.panel-bullet {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  margin-top: 7px;
  flex-shrink: 0;
  background: var(--accent);
}

.trust-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
  margin-top: 14px;
}

.trust-item {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 13px;
  padding: 14px;
  box-shadow: var(--shadow-md);
}

.trust-item strong {
  display: block;
  margin-bottom: 3px;
  font-size: 0.98rem;
}

.trust-item span {
  display: block;
  color: var(--ink-700);
  font-size: 0.86rem;
}

.about-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 16px;
}

.about-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
}

.about-card {
  padding: 24px;
}

.about-card > p {
  color: var(--ink-800);
  margin-bottom: 18px;
}

.about-points {
  display: grid;
  gap: 10px;
}

.about-points li {
  border: 1px solid var(--line);
  background: var(--paper-200);
  border-radius: 11px;
  padding: 12px;
}

.about-points h3 {
  font-size: 1rem;
  margin-bottom: 5px;
}

.about-points p {
  color: var(--ink-700);
  font-size: 0.92rem;
}

.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 14px;
}

.service-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 15px;
  overflow: hidden;
  box-shadow: var(--shadow-md);
  transition: var(--transition);
}

.service-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 18px 34px rgba(8, 25, 40, 0.16);
}

.service-card img {
  width: 100%;
  height: 172px;
  object-fit: cover;
}

.service-body {
  padding: 15px 15px 20px;
}

.service-body h3 {
  font-size: 1.08rem;
  margin-bottom: 6px;
}

.service-body p {
  color: var(--ink-700);
  font-size: 0.93rem;
}

.process-shell {
  background: linear-gradient(150deg, #0d2940, #123550 38%, #154565 100%);
  border-radius: var(--radius-xl);
  padding: clamp(24px, 4vw, 40px);
  color: #edf4f8;
  box-shadow: var(--shadow-lg);
}

.process-shell .section-kicker {
  color: #95bed8;
}

.process-shell .section-title {
  color: #ffffff;
}

.process-shell .section-intro {
  color: #d6e6f1;
}

.process-grid {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 10px;
}

.process-step {
  border-radius: 12px;
  border: 1px solid rgba(255, 255, 255, 0.18);
  background: rgba(255, 255, 255, 0.08);
  padding: 14px;
}

.step-index {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: rgba(236, 127, 44, 0.9);
  color: #ffffff;
  font-size: 0.9rem;
  font-weight: 700;
  margin-bottom: 10px;
}

.process-step h3 {
  color: #ffffff;
  font-size: 1.02rem;
  margin-bottom: 4px;
}

.process-step p {
  color: #d6e6f1;
  font-size: 0.9rem;
}

.team-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.team-card {
  background: var(--card);
  border: 1px solid var(--line);
  border-radius: 15px;
  padding: 4px;
  box-shadow: var(--shadow-md);
}

.team-body {
  background: #f5f9ff;
  border: 1px solid #d3e2f5;
  border-radius: 11px;
  padding: 16px;
}

.team-body h3 {
  font-size: 1.2rem;
  margin-bottom: 4px;
}

.team-note {
  color: var(--ink-700);
  font-size: 0.9rem;
  margin-bottom: 10px;
}

.team-role {
  color: var(--signal);
  font-weight: 700;
  margin-bottom: 10px;
}

.team-contact {
  display: grid;
  gap: 5px;
}

.team-contact a {
  text-decoration: none;
  color: var(--ink-800);
  font-weight: 500;
}

.team-contact a:hover {
  text-decoration: underline;
}

.partner-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 10px;
}

.partner-card {
  min-height: 128px;
  border-radius: 13px;
  border: 1px solid var(--line);
  background: var(--card);
  box-shadow: var(--shadow-md);
  padding: 15px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.partner-card img {
  width: 100%;
  height: 50px;
  object-fit: contain;
  filter: grayscale(1);
  opacity: 0.82;
  transition: var(--transition);
}

.partner-card:hover img {
  filter: grayscale(0);
  opacity: 1;
}

.partner-card p {
  margin-top: 8px;
  color: var(--ink-700);
  font-size: 0.9rem;
  font-weight: 700;
}

.contact-wrap {
  display: grid;
  grid-template-columns: minmax(0, 0.88fr) minmax(0, 1.12fr);
  gap: 14px;
}

.contact-panel {
  border-radius: 16px;
  background: linear-gradient(152deg, #0f3047, #215373 60%, #1b8a72 110%);
  color: #eff6fb;
  padding: 22px;
  box-shadow: var(--shadow-lg);
}

.contact-panel .label {
  display: block;
  margin-bottom: 6px;
  font-size: 0.74rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #a4c9de;
  font-weight: 700;
}

.contact-panel h3 {
  color: #ffffff;
  font-size: 1.43rem;
  margin-bottom: 8px;
}

.contact-panel p {
  color: #e0edf6;
  margin-bottom: 14px;
}

.contact-list {
  display: grid;
  gap: 10px;
}

.contact-list li {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  border-radius: 11px;
  padding: 10px 12px;
}

.contact-list span {
  display: block;
  margin-bottom: 3px;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: #bdd9eb;
  font-weight: 700;
}

.contact-list a {
  color: #ffffff;
  text-decoration: none;
  font-weight: 700;
}

.contact-list p {
  margin: 0;
  color: #ffffff;
  font-weight: 700;
}

.contact-list a:hover {
  text-decoration: underline;
}

.contact-form-wrap {
  border-radius: 16px;
  border: 1px solid var(--line);
  background: var(--card);
  box-shadow: var(--shadow-md);
  padding: 20px;
}

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-field {
  display: grid;
  gap: 6px;
}

.form-field.full {
  grid-column: 1 / -1;
}

.form-field label {
  color: var(--ink-800);
  font-weight: 700;
  font-size: 0.84rem;
}

.form-field .optional {
  color: var(--ink-700);
  font-weight: 500;
}

input,
select,
textarea {
  width: 100%;
  padding: 11px 12px;
  border: 1px solid var(--line);
  border-radius: 10px;
  font: inherit;
  color: var(--ink-900);
  background: #f1f7ff;
  transition: var(--transition);
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: var(--ink-700);
  box-shadow: 0 0 0 4px rgba(45, 96, 127, 0.15);
  background: #f7fbff;
}

textarea {
  min-height: 130px;
  resize: vertical;
}

.form-actions {
  margin-top: 12px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.form-btn {
  border: none;
  border-radius: 10px;
  padding: 12px;
  color: #ffffff;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition);
}

.form-btn.whatsapp {
  background: linear-gradient(135deg, #26cb65, #189a49);
}

.form-btn.email {
  background: linear-gradient(135deg, #1d729f, #14547f);
}

.form-btn:hover {
  transform: translateY(-2px);
}

.form-btn:disabled {
  opacity: 0.72;
  cursor: not-allowed;
  transform: none;
}

.form-message {
  display: none;
  margin-top: 10px;
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 0.9rem;
}

.form-message.info {
  display: block;
  border: 1px solid #bfd2e2;
  background: #eef5fb;
  color: #194969;
}

.form-message.success {
  display: block;
  border: 1px solid #a8e2c6;
  background: #ecf9f3;
  color: #18694e;
}

.form-message.error {
  display: block;
  border: 1px solid #f0bbbb;
  background: #fdf0f0;
  color: #8a2424;
}

.site-footer {
  border-top: 1px solid var(--line);
  margin-top: 34px;
  background: rgba(222, 236, 252, 0.8);
}

.footer-inner {
  text-align: center;
  padding: 24px 0 34px;
}

.footer-inner p {
  color: var(--ink-700);
}

.footer-inner p + p {
  margin-top: 8px;
  font-size: 0.9rem;
}

@media (max-width: 1080px) {
  .hero-grid,
  .about-grid,
  .contact-wrap {
    grid-template-columns: 1fr;
  }

  .process-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .trust-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
}

@media (max-width: 980px) {
  .site-header {
    grid-template-columns: auto 1fr auto auto;
    gap: 8px;
    position: sticky;
  }

  .site-nav {
    position: absolute;
    top: calc(100% + 8px);
    left: 14px;
    right: 14px;
    display: grid;
    gap: 4px;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 8px;
    background: rgba(231, 242, 255, 0.97);
    box-shadow: var(--shadow-lg);
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
    transition: var(--transition);
  }

  .site-nav.is-open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .site-nav a {
    border-radius: 10px;
  }

  .menu-button {
    display: inline-flex;
  }

const languageSelect = document.getElementById("languageSelect");
const menuButton = document.getElementById("menuButton");
const mainNav = document.getElementById("mainNav");
const contactForm = document.getElementById("contactForm");
const submitWhatsappButton = document.getElementById("submitWhatsapp");
const submitEmailButton = document.getElementById("submitEmail");
const formStatus = document.getElementById("formStatus");
const metaDescription = document.querySelector('meta[name="description"]');

let currentLanguage = "en";

function getValueByPath(source, path) {
  return path.split(".").reduce((current, key) => {
    if (current && Object.prototype.hasOwnProperty.call(current, key)) {
      return current[key];
    }
    return undefined;
  }, source);
}

function closeMobileMenu() {
  mainNav.classList.remove("is-open");
  menuButton.setAttribute("aria-expanded", "false");
}

function setFormMessage(type, message) {
  formStatus.className = "form-message";
  formStatus.textContent = "";

  if (!type || !message) {
    return;
  }

  formStatus.classList.add(type);
  formStatus.textContent = message;
}

function setButtonLoading(isLoading) {
  const t = translations[currentLanguage];
  submitWhatsappButton.disabled = isLoading;
  submitEmailButton.disabled = isLoading;

  if (isLoading) {
    submitWhatsappButton.textContent = t.contact.buttons.sending;
    submitEmailButton.textContent = t.contact.buttons.sending;
  } else {
    submitWhatsappButton.textContent = t.contact.buttons.whatsapp;
    submitEmailButton.textContent = t.contact.buttons.email;
  }
}

function applyTranslations(lang) {
  const t = translations[lang] || translations.en;

  document.querySelectorAll("[data-i18n]").forEach((element) => {
    const value = getValueByPath(t, element.dataset.i18n);
    if (typeof value === "string") {
      element.textContent = value;
    }
  });

  document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
    const value = getValueByPath(t, element.dataset.i18nPlaceholder);
    if (typeof value === "string") {
      element.placeholder = value;
    }
  });

  document.querySelectorAll("[data-i18n-aria]").forEach((element) => {
    const value = getValueByPath(t, element.dataset.i18nAria);
    if (typeof value === "string") {
      element.setAttribute("aria-label", value);
    }
  });

  document.title = t.meta.title;
  if (metaDescription) {
    metaDescription.setAttribute("content", t.meta.description);
  }

  languageSelect.value = lang;
}

function setLanguage(lang) {
  currentLanguage = translations[lang] ? lang : "en";
  document.documentElement.lang = currentLanguage;
  localStorage.setItem("workitall-language", currentLanguage);
  applyTranslations(currentLanguage);
}

function buildSubmissionData() {
  const t = translations[currentLanguage];
  const sectorField = document.getElementById("sector");
  const selectedSector = sectorField.options[sectorField.selectedIndex];

  return {
    name: document.getElementById("name").value.trim(),
    email: document.getElementById("email").value.trim(),
    phone: document.getElementById("phone").value.trim() || t.contact.whatsapp.notProvided,
    sector: selectedSector ? selectedSector.text : t.contact.whatsapp.notProvided,
    message: document.getElementById("message").value.trim()
  };
}

function buildSubmissionMessage(payload) {
  const t = translations[currentLanguage];

  return `${t.contact.whatsapp.header}\n\n${t.contact.whatsapp.labels.name}: ${payload.name}\n${t.contact.whatsapp.labels.email}: ${payload.email}\n${t.contact.whatsapp.labels.phone}: ${payload.phone}\n${t.contact.whatsapp.labels.sector}: ${payload.sector}\n\n${t.contact.whatsapp.labels.message}:\n${payload.message}`;
}

function handleSubmission(channel) {
  const t = translations[currentLanguage];

  if (!contactForm.checkValidity()) {
    contactForm.reportValidity();
    setFormMessage("error", t.contact.formValidation || "Please complete all required fields.");
    return;
  }

  const payload = buildSubmissionData();
  const message = buildSubmissionMessage(payload);
  const subject = `${t.contact.whatsapp.subject} - ${payload.name}`;

  setButtonLoading(true);
  setFormMessage("info", t.contact.messages.sending);

  window.setTimeout(() => {
    if (channel === "email") {
      const mailto = `mailto:contact@workitall.site?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message)}`;
      window.location.href = mailto;
      setFormMessage("success", t.contact.messages.email);
    } else {
      const whatsappUrl = `https://wa.me/212650720875?text=${encodeURIComponent(message)}`;
      const openedWindow = window.open(whatsappUrl, "_blank", "noopener");
      if (!openedWindow) {
        window.location.href = whatsappUrl;
      }
      setFormMessage("success", t.contact.messages.whatsapp);
    }

    setButtonLoading(false);
    contactForm.reset();

    window.setTimeout(() => {
      setFormMessage("", "");
    }, 2600);
  }, 550);
}

menuButton.addEventListener("click", () => {
  const isOpen = mainNav.classList.toggle("is-open");
  menuButton.setAttribute("aria-expanded", String(isOpen));
});

document.querySelectorAll("#mainNav a").forEach((link) => {
  link.addEventListener("click", closeMobileMenu);
});

document.addEventListener("click", (event) => {
  if (window.innerWidth > 980) {
    return;
  }

  if (!mainNav.contains(event.target) && !menuButton.contains(event.target)) {
    closeMobileMenu();
  }
});

window.addEventListener("resize", () => {
  if (window.innerWidth > 980) {
    closeMobileMenu();
  }
});

contactForm.addEventListener("submit", (event) => {
  event.preventDefault();
  handleSubmission("whatsapp");
});

submitEmailButton.addEventListener("click", (event) => {
  event.preventDefault();
  handleSubmission("email");
});

languageSelect.addEventListener("change", (event) => {
  setLanguage(event.target.value);
});

window.addEventListener("DOMContentLoaded", () => {
  const savedLanguage = localStorage.getItem("workitall-language") || "en";
  setLanguage(savedLanguage);

  const revealElements = document.querySelectorAll(".reveal");
  revealElements.forEach((element, index) => {
    const delay = Math.min(index * 55, 440);
    element.style.setProperty("--delay", `${delay}ms`);
  });

  if (!("IntersectionObserver" in window)) {
    revealElements.forEach((element) => element.classList.add("is-visible"));
    return;
  }

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) {
        entry.target.classList.add("is-visible");
        observer.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.14,
    rootMargin: "0px 0px -40px 0px"
  });

  revealElements.forEach((element) => observer.observe(element));
});
</script>
